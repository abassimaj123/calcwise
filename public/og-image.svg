<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A6AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1455CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circle top-right -->
  <circle cx="1100" cy="80" r="300" fill="#1A6AFF" opacity="0.05" />
  <!-- Decorative circle bottom-left -->
  <circle cx="100" cy="580" r="200" fill="#1A6AFF" opacity="0.04" />

  <!-- Logo / Brand bar -->
  <rect x="60" y="60" width="180" height="50" rx="12" fill="url(#accent)" />
  <text x="150" y="93" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">CalqWise</text>

  <!-- Main headline -->
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#0F172A">Free Financial</text>
  <text x="60" y="310" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1A6AFF">Calculators</text>

  <!-- Subheadline -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="30" fill="#64748B">Mortgage · Tax · Salary · Loans</text>
  <text x="60" y="425" font-family="Arial, sans-serif" font-size="30" fill="#64748B">US · Canada · UK · Australia · Ireland · NZ</text>

  <!-- Stats pills -->
  <rect x="60" y="480" width="200" height="52" rx="26" fill="#1A6AFF" />
  <text x="160" y="512" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">57+ Calculators</text>

  <rect x="280" y="480" width="180" height="52" rx="26" fill="white" stroke="#1A6AFF" stroke-width="2" />
  <text x="370" y="512" font-family="Arial, sans-serif" font-size="22" fill="#1A6AFF" text-anchor="middle">6 Countries</text>

  <rect x="480" y="480" width="160" height="52" rx="26" fill="white" stroke="#1A6AFF" stroke-width="2" />
  <text x="560" y="512" font-family="Arial, sans-serif" font-size="22" fill="#1A6AFF" text-anchor="middle">100% Free</text>

  <!-- URL -->
  <text x="60" y="590" font-family="Arial, sans-serif" font-size="22" fill="#94A3B8">calqwise.com</text>
</svg>
