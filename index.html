    <script>
      // Bug fix: move MutationObserver setup inside DOMContentLoaded so #root exists

        var _twRoot = document.getElementById('root');
        if (_twRoot && _twRoot instanceof Node) {
          var _twObserver = new MutationObserver(function() {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg', base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/' });
          });
          _twObserver.observe(_twRoot, { childList: true, subtree: true });
